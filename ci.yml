# Two independent jobs, not one combined job. Two reasons:
# 1. They run in parallel, so CI finishes in the time of the slower one, not
#    the sum of both.
# 2. A failure clearly points at "backend" or "frontend" in the GitHub UI
#    instead of a single opaque "CI failed" status.
#
# This only lints for now (no tests, no build, no deploy) — matches the
# scaffolding stage of the project. Test/build steps get added once there's
# real logic worth testing.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint (Ruff + Black)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Black (check only)
        run: black --check .

  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
